# Beats Library - Curated patterns for Neural Music Conductor
# Claude can add new patterns during conductor sessions
# Each pattern has mood tags for brain state matching

library:
  # === GROUNDING (K_HIGH_LOAD, overwhelmed) ===
  grounding_deep_bass:
    pattern: 'stack(s("bd").slow(2).gain(0.6).lpf(100), note("c1").s("sine").decay(2).sustain(0).slow(4))'
    moods: [grounding, minimal, calming]
    source: original
    notes: "Ultra sparse, sub-bass only, for overwhelm states"

  grounding_earth_pulse:
    pattern: 'note("c1 ~ ~ c1 ~ ~ c1 ~").s("sine").lpf(80).gain(0.5).slow(2)'
    moods: [grounding, minimal, earth]
    source: generated
    notes: "Slow earth pulse, very low frequency"

  # === AMBIENT (K_DOWNSHIFT, settling) ===
  ambient_slow_chords:
    pattern: 'stack(note("<Dm Am F Em>/4").s("sawtooth").lpf(500).room(0.9).gain(0.4), s("~ rim").slow(4).gain(0.15).room(0.8), note("d1").s("sine").decay(4).sustain(0.1).lpf(200)).slow(2)'
    moods: [ambient, settling, warm]
    source: original
    notes: "Slow chord progression with subtle percussion"

  ambient_pad_drift:
    pattern: 'note("<C4 E4 G4 B4>/8").s("sawtooth").lpf(sine.range(300,800).slow(16)).room(0.9).gain(0.3)'
    moods: [ambient, dreamy, floating]
    source: generated
    notes: "Drifting pad with slow filter sweep"

  ambient_meditation:
    pattern: 'stack(note("c3").s("sine").room(0.95).gain(0.3).slow(4), note("g3").s("triangle").room(0.9).delay(0.4).gain(0.2).slow(3))'
    moods: [ambient, meditation, peaceful]
    source: generated
    notes: "Overlapping drone tones"

  # === FLOW (K_FLOW, engaged) ===
  flow_warm_groove:
    pattern: 'stack(note("<C3 G3 Eb3 Bb2>/4").s("sawtooth").lpf(600).room(0.8).gain(0.4), s("~ hh*4").gain(0.2).lpf(800), note("c2 g1").s("sine").slow(2).gain(0.5))'
    moods: [flow, warm, supportive]
    source: original
    notes: "Warm chords with subtle hi-hats"

  flow_chill_beat:
    pattern: 'stack(s("bd ~ bd ~, ~ sd ~ sd").bank("RolandTR808").gain(0.4), note("<c3 eb3 g3 bb3>/2").s("sawtooth").lpf(700).room(0.6).gain(0.35))'
    moods: [flow, chill, groovy]
    source: generated
    notes: "Relaxed beat with jazzy chords"

  flow_liquid_dnb:
    pattern: 'stack(s("bd ~ ~ bd ~ ~ bd ~, ~ ~ sd ~ ~ ~ sd ~").bank("RolandTR909").gain(0.5), note("<Am Dm G C>/2").s("triangle").lpf(800).room(0.7).gain(0.3)).fast(1.5)'
    moods: [flow, liquid, movement]
    source: generated
    notes: "Liquid drum and bass feel"

  # === FOCUS (K_THINKING, cognitive) ===
  focus_steady_pulse:
    pattern: 'stack(s("bd*4, ~ sd ~ sd, hh*8").bank("RolandTR909").gain(0.5), note("<c3 g2 c3 g2>/2").s("sawtooth").lpf(400)).lpf(sine.range(800,2000).slow(16))'
    moods: [focus, steady, rhythmic]
    source: original
    notes: "Four-on-the-floor with bass movement"

  focus_minimal_tech:
    pattern: 'stack(s("bd bd ~ bd, ~ ~ sd ~, [~ hh]*4").bank("RolandTR909").gain(0.45), note("c2").s("sawtooth").lpf(300).gain(0.4))'
    moods: [focus, minimal, tech]
    source: generated
    notes: "Minimal techno for deep work"

  focus_lo_fi:
    pattern: 'stack(s("bd ~ sd ~, hh*4").gain(0.4).lpf(3000), note("<c3 e3 g3 a3>/4").s("triangle").room(0.5).gain(0.35).lpf(1200))'
    moods: [focus, lofi, warm]
    source: generated
    notes: "Lo-fi hip hop study beats feel"

  # === PLAYFUL (K_PLAYING, creative) ===
  playful_arps:
    pattern: 'stack(s("bd [~ bd] ~ bd, ~ sd ~ [sd sd]").bank("RolandTR808"), note("<[c4 e4] [g4 b4] [a4 f4]>*2").s("triangle").delay(0.3).room(0.5), s("arpy*8").n(irand(12)).gain(0.3))'
    moods: [playful, creative, arps]
    source: original
    notes: "Bouncy arpeggios with random notes"

  playful_funky:
    pattern: 'stack(s("bd ~ bd ~, ~ sd ~ sd, hh*8").bank("RolandTR808").gain(0.5), note("<c4 [~ e4] g4 [e4 c4]>").s("sawtooth").lpf(1200).gain(0.4))'
    moods: [playful, funky, bouncy]
    source: generated
    notes: "Funky rhythm with syncopated melody"

  playful_glitch:
    pattern: 'stack(s("bd*2, sd*3, hh*5").bank("RolandTR909").rarely(x => x.speed(2)).gain(0.4), note("c4 e4 g4 b4").s("triangle").sometimes(x => x.delay(0.5)).gain(0.3))'
    moods: [playful, glitch, experimental]
    source: generated
    notes: "Glitchy polyrhythms"

  # === PEAK (K_MUSICAL_CHILLS, emotional) ===
  peak_soaring:
    pattern: 'stack(note("<Cm Am Fm Gm>/2").s("sawtooth").lpf(900).room(0.9).gain(0.5), note("c4 g4 eb5 g5").s("triangle").slow(2).delay(0.3).gain(0.4))'
    moods: [peak, soaring, emotional]
    source: original
    notes: "Expansive chords with high melody"

  peak_euphoria:
    pattern: 'stack(note("<C G Am F>/2").s("sawtooth").lpf(1200).room(0.85).gain(0.5), note("c5 e5 g5 c6").s("triangle").delay(0.4).room(0.8).gain(0.35).arp("up"))'
    moods: [peak, euphoria, uplifting]
    source: generated
    notes: "Major key euphoria"

  peak_transcendent:
    pattern: 'stack(note("<Am F C G>/4").s("sawtooth").lpf(800).room(0.95).gain(0.4), note("e5 a5 b5 e6").s("sine").slow(2).room(0.9).delay(0.5).gain(0.3))'
    moods: [peak, transcendent, vast]
    source: generated
    notes: "Spacious and transcendent feel"

  # === WEB-SOURCED PATTERNS ===
  web_piano_melody:
    pattern: 'note("c a f e").s("sawtooth").lpf(1000).room(0.6).gain(0.4)'
    moods: [flow, melodic, simple]
    source: web
    notes: "From strudel.cc/learn - simple melodic line"

  web_arp_chain:
    pattern: 'note("a3 c#4 e4 a4").s("sawtooth").cutoff(500).room(0.5).gain(0.4)'
    moods: [flow, arps, clean]
    source: web
    notes: "From strudel.cc docs - arpeggio with effects"

  web_techno_minimal:
    pattern: 'stack(s("bd*4").bank("RolandTR909").gain(0.6), s("~ sd ~ sd").bank("RolandTR909").gain(0.5), s("hh*8").bank("RolandTR909").gain(0.3).lpf(2000))'
    moods: [focus, techno, driving]
    source: web
    notes: "Classic 909 four-on-the-floor"

  web_ambient_wash:
    pattern: 'note("<C3 E3 G3 B3>/8").s("sawtooth").lpf(sine.range(200,600).slow(16)).room(0.95).gain(0.35).slow(2)'
    moods: [ambient, wash, peaceful]
    source: web
    notes: "Slow evolving pad with filter automation"

  web_breakbeat:
    pattern: 'stack(s("bd ~ [~ bd] ~, ~ sd ~ sd, hh*8").bank("RolandTR808").gain(0.5), note("<c3 ~ eb3 ~>/4").s("sawtooth").lpf(600).gain(0.35))'
    moods: [playful, breakbeat, bouncy]
    source: web
    notes: "Breakbeat pattern with bass stabs"

# === FULL TRACKS (with samples) ===
  atb_till_i_come:
    pattern: |
      const bpm = 140
      samples({
        tillIcome: 'https://raw.githubusercontent.com/konradish/music/main/till%20i%20come.wav',
        changeIt: 'https://raw.githubusercontent.com/konradish/music/main/change%20it%20and%20say.wav'
      })
      stack(
        note("a0").s("sawtooth").lpf(120).gain(0.12),
        note("<[c5,c6] [c5,c6] [d5,d6] [f5,f6]>/4").s("sawtooth").lpf(2000).gain(0.08).struct("1*16"),
        note(`[~ a4 a4 b4 a4 ~ c5 ~ c5 ~ c5 e5 d5 f4@2 ~ f4 g4 a4 g4 ~ a4 ~ c5 ~ c5 d5 c5 g4@3]/6`).s("sawtooth").lpf(4500).delay(0.4).dfb(0.55).dt(60/bpm/2).room(0.2).gain(0.18).mask("<0 0 0 1 1 1>".slow(6)),
        note("<[a3,c4,e4] [a3,c4,e4] [d4,f4,a4] [f4,a4,c5]>/6").s("gm_pad_choir").lpf(1200).room(0.5).gain(0.05),
        note("<a1 a1 d2 f1>/6").s("sawtooth").lpf(500).gain(0.1).mask("<0 1 1 1 1 0>".slow(6)),
        s("bd*4").bank("RolandTR909").gain(0.16).mask("<0 0 1 1 1 0>".slow(6)),
        s("~ cp ~ cp").bank("RolandTR909").room(0.25).gain(0.08).mask("<0 0 1 1 1 0>".slow(6)),
        s("hh*8").bank("RolandTR909").gain(0.05).mask("<0 0 0 0 1 0>".slow(6)),
        s("tillIcome").struct("[1 ~ ~ ~] [~ ~ 1 ~] [~ ~ ~ ~] [1 ~ ~ ~]").slow(4).gain(0.3),
        s("changeIt").struct("[~ ~ ~ ~] [~ ~ ~ ~] [~ 1 ~ ~] [~ ~ ~ ~]").slow(4).gain(0.3)
      ).gain(0.35).cpm(bpm/4)
    moods: [peak, euphoria, trance, driving, vocals]
    source: recreation
    notes: "ATB 9pm (Till I Come) - Am Dm F progression, 140 BPM, with vocal samples"

# Mood mappings to brain states
mood_state_map:
  K_HIGH_LOAD: [grounding, minimal, calming]
  K_DOWNSHIFT: [ambient, settling, meditation, peaceful]
  K_FLOW: [flow, warm, chill, supportive]
  K_THINKING: [focus, steady, rhythmic, minimal]
  K_PLAYING: [playful, creative, funky, bouncy]
  K_MUSICAL_CHILLS: [peak, soaring, emotional, euphoria]

# Web sources to search for new patterns
pattern_sources:
  - url: "https://strudel.cc/workshop/first-sounds/"
    description: "Official Strudel workshop examples"
  - url: "https://github.com/terryds/awesome-strudel"
    description: "Community curated patterns"
  - url: "https://club.tidalcycles.org/"
    description: "TidalCycles forum (translate to Strudel)"
