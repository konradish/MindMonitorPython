# Strudel Pattern Library for Neural Music Conductor
# Each pattern is single-line for PowerShell compatibility
# Patterns keyed by EEG state from state_definition table

patterns:
  K_FLOW:
    description: "Warm, spacious, supportive - engaged without strain"
    goal: "Sustain focus without demanding attention"
    pattern: 'stack(note("<C3 G3 Eb3 Bb2>/4").s("sawtooth").lpf(600).room(0.8).gain(0.4), s("~ hh*4").gain(0.2).lpf(800), note("c2 g1").s("sine").slow(2).gain(0.5))'
    tempo_cps: 0.5
    tags: [ambient, pad, warm]

  K_PLAYING:
    description: "Playful, surprising - creative/musical absorption"
    goal: "Room for exploration, not thinking - being"
    pattern: 'stack(s("bd [~ bd] ~ bd, ~ sd ~ [sd sd]").bank("RolandTR808"), note("<[c4 e4] [g4 b4] [a4 f4]>*2").s("triangle").delay(0.3).room(0.5), s("arpy*8").n(irand(12)).gain(0.3))'
    tempo_cps: 0.6
    tags: [playful, drums, arps]

  K_DOWNSHIFT:
    description: "Slow evolution, gentle landing - settling from activated state"
    goal: "Ambient wash, conscious calm"
    pattern: 'stack(note("<Dm Am F Em>/4").s("sawtooth").lpf(500).room(0.9).gain(0.4), s("~ rim").slow(4).gain(0.15).room(0.8), note("d1").s("sine").decay(4).sustain(0.1).lpf(200)).slow(2)'
    tempo_cps: 0.3
    tags: [ambient, slow, settling]

  K_HIGH_LOAD:
    description: "Sparse, grounding - high cognitive/sensory load detected"
    goal: "Reduce complexity immediately, ground the nervous system"
    pattern: 'stack(s("bd").slow(2).gain(0.6).lpf(100), note("c1").s("sine").decay(2).sustain(0).slow(4))'
    tempo_cps: 0.25
    tags: [minimal, grounding, sparse]

  K_THINKING:
    description: "Steady rhythmic structure - active cognitive effort"
    goal: "Support focus without distraction"
    pattern: 'stack(s("bd*4, ~ sd ~ sd, hh*8").bank("RolandTR909").gain(0.5), note("<c3 g2 c3 g2>/2").s("sawtooth").lpf(400)).lpf(sine.range(800,2000).slow(16))'
    tempo_cps: 0.55
    tags: [rhythmic, steady, focus]

  K_MUSICAL_CHILLS:
    description: "Expansive, soaring - musical frisson/emotional peak"
    goal: "Enhance the moment, don't interrupt"
    pattern: 'stack(note("<Cm Am Fm Gm>/2").s("sawtooth").lpf(900).room(0.9).gain(0.5), note("c4 g4 eb5 g5").s("triangle").slow(2).delay(0.3).gain(0.4))'
    tempo_cps: 0.6
    tags: [expansive, emotional, synth]

  # Fallback states (from hardcoded detector)
  FOCUSED:
    description: "Standard focused state"
    pattern: 'stack(s("bd*4, ~ sd ~ sd, hh*8").bank("RolandTR909").gain(0.4), note("c3 g2").s("sawtooth").lpf(600).slow(2))'
    tempo_cps: 0.5
    tags: [focus, steady]

  RELAXED:
    description: "Standard relaxed state"
    pattern: 'stack(note("<C4 E4 G4 B4>/4").s("gm_pad_warm").room(0.8), s("~ hh*2").gain(0.15))'
    tempo_cps: 0.4
    tags: [calm, pad]

  DROWSY:
    description: "Very relaxed or tired"
    pattern: 'note("<C3 G3>/8").s("sine").room(0.9).gain(0.3).lpf(400)'
    tempo_cps: 0.2
    tags: [minimal, quiet]

  # Silence / stop
  STOP:
    description: "Stop playback"
    pattern: 'silence'
    tempo_cps: 0.5
    tags: [stop]

# Transition patterns (for fading between states)
transitions:
  fade_out: '.gain(sine.range(0.6, 0).slow(8))'
  fade_in: '.gain(sine.range(0, 0.6).slow(8))'
  filter_sweep_down: '.lpf(sine.range(4000, 200).slow(8))'
  filter_sweep_up: '.lpf(sine.range(200, 4000).slow(8))'
