services:
  osc-receiver:
    build:
      context: ..
      dockerfile: docker/Dockerfile.osc
    container_name: mind-monitor-osc
    ports:
      - "5000:5000/udp"
    volumes:
      - ..:/app
    environment:
      - DATABASE_URL=postgresql://eeg:eegpass@host.docker.internal:5590/eeg
      - TZ=America/Chicago
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    network_mode: bridge
